  <line x1="287" y1="170" x2="344" y2="227" stroke="#1B2C3A" stroke-width="9" stroke-linecap="round"/>
  <line x1="168" y1="342" x2="225" y2="285" stroke="#1B2C3A" stroke-width="9" stroke-linecap="round"/>
  <line x1="287" y1="342" x2="344" y2="285" stroke="#1B2C3A" stroke-width="9" stroke-linecap="round"/>

  <!-- Heart shape at bottom -->
  <path d="M256 478 C248 464,198 438,192 410 C186 384,202 368,222 374 C234 378,248 392,256 404 C264 392,278 378,290 374 C310 368,326 384,320 410 C314 438,264 464,256 478Z" fill="#C9A84C"/>

