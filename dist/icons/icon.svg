  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#C9A84C" stroke-width="6" opacity="0.3"/>
  
  <!-- Lords Brigade Celtic Knot Cross (scaled to fit icon) -->
