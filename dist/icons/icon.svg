  <circle cx="332" cy="150" r="6" fill="#E8C96A" opacity="0.5"/>
  <circle cx="180" cy="340" r="6" fill="#E8C96A" opacity="0.5"/>
  <circle cx="332" cy="340" r="6" fill="#E8C96A" opacity="0.5"/>
