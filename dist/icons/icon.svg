  <path d="M256 52 C305 52,370 88,375 148 C428 134,472 174,466 230 C472 284,430 328,377 320 C382 388,344 428,296 432 C283 470,256 494,256 494 C256 494,229 470,216 432 C168 428,130 388,135 320 C82 328,40 284,46 230 C40 174,84 134,137 148 C142 88,207 52,256 52Z" fill="none" stroke="#C9A84C" stroke-width="10" opacity="0.4"/>

